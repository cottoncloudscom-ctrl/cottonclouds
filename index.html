<section class='hero'>
<h2>Welcome to Cotton Clouds</h2>
<p>Premium Bedsheets, Electronics & More</p>
<input id='search' placeholder='Search products...' onkeyup='filterProducts()'>
</section>
<div class='container'><div class='grid' id='products'>
<div class='card'><h3>Bedsheet Collection</h3></div>
<div class='card'><h3>Electronics Deals</h3></div>
<div class='card'><h3>Other Products</h3></div>
</div></div>
<script>
function filterProducts(){
let q=document.getElementById('search').value.toLowerCase();
document.querySelectorAll('#products .card').forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(q)?'block':'none';
});
}
</script>
